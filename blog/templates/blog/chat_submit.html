<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if edit %}Edit Post{% else %}Create Post{% endif %}</title>
</head>
<body>
    <h1>{% if edit %}Edit Post{% else %}Create New Post{% endif %}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">{% if edit %}Save Changes{% else %}Create Post{% endif %}</button>
    </form>
    <a href="{% url 'post_list' %}">Cancel</a>
</body>
</html>
